<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Cart | FoodApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #f5f5f5;
        }

        .navbar{
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .cart-header{

            background:
                linear-gradient(135deg,#ff9800,#ff5722);

            color: white;

            padding: 50px;

            border-radius: 20px;
        }

        .cart-card{

            border: none;

            border-radius: 20px;

            transition: 0.3s;
        }

        .cart-card:hover{

            transform: translateY(-5px);
        }

        .summary-box{

            background: white;

            border-radius: 20px;
        }

        .btn{

            border-radius: 10px;
        }

    </style>

</head>

<body>

<!-- LOGIN CHECK -->
<script>

let token =
    localStorage.getItem("token");

if(!token){

    alert("Please login first!");

    window.location.href =
        "login.html";
}

</script>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
            href="index.html">

            🍔 FoodApp

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="menu.html">

                        Menu

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                        href="cart.html">

                        Cart

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="orders.html">

                        Orders

                    </a>

                </li>

                <li class="nav-item ms-3">

                    <button class="btn btn-danger"
                        onclick="logout()">

                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- HEADER -->
<div class="container mt-5">

    <div class="cart-header shadow">

        <h1 class="fw-bold">
            🛒 Your Shopping Cart
        </h1>

        <p class="lead mb-0">
            Review your selected items and place your order.
        </p>

    </div>

</div>

<!-- CART -->
<div class="container mt-5 mb-5">

    <div class="row">

        <!-- CART ITEMS -->
        <div class="col-lg-8">

            <div id="cart-items"></div>

        </div>

        <!-- SUMMARY -->
        <div class="col-lg-4">

            <div class="summary-box shadow p-4">

                <h3 class="fw-bold mb-4">
                    Order Summary
                </h3>

                <h4 id="total"
                    class="mb-4">

                    Total: ₹0

                </h4>

                <div class="d-grid gap-3">

                    <button class="btn btn-success btn-lg"
                        onclick="placeOrder()">

                        Place Order

                    </button>

                    <button class="btn btn-warning btn-lg"
                        onclick="checkout()">

                        Checkout

                    </button>

                    <button class="btn btn-outline-danger"
                        onclick="clearCart()">

                        Clear Cart

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const BASE_URL =
    "http://127.0.0.1:5000";

// ================= LOAD CART =================
function loadCart(){

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    let container =
        document.getElementById("cart-items");

    let total = 0;

    // EMPTY CART
    if(cart.length === 0){

        container.innerHTML = `
            <div class="card cart-card shadow p-5 text-center">

                <h2>🛒</h2>

                <h4 class="mt-3">
                    Your cart is empty
                </h4>

                <p class="text-muted">
                    Add delicious food items from the menu.
                </p>

                <a href="menu.html"
                    class="btn btn-warning mt-2">

                    Browse Menu

                </a>

            </div>
        `;

        document.getElementById("total")
            .innerText = "Total: ₹0";

        return;
    }

    let html = "";

    cart.forEach((item, index) => {

        let subtotal =
            item.price * item.quantity;

        total += subtotal;

        html += `
        <div class="card cart-card shadow mb-3 p-4">

            <div class="d-flex justify-content-between align-items-center flex-wrap">

                <div>

                    <h4 class="fw-bold">
                        ${item.name}
                    </h4>

                    <p class="mb-1">
                        Price: ₹${item.price}
                    </p>

                    <p class="mb-1">
                        Quantity: ${item.quantity}
                    </p>

                    <h5 class="text-success">
                        Subtotal: ₹${subtotal}
                    </h5>

                </div>

                <div>

                    <button class="btn btn-danger"
                        onclick="removeItem(${index})">

                        Remove

                    </button>

                </div>

            </div>

        </div>
        `;
    });

    container.innerHTML = html;

    document.getElementById("total")
        .innerText = "Total: ₹" + total;
}

// ================= REMOVE ITEM =================
function removeItem(index){

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index, 1);

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    loadCart();
}

// ================= CLEAR CART =================
function clearCart(){

    localStorage.removeItem("cart");

    loadCart();
}

// ================= PLACE ORDER =================
async function placeOrder(){

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){

        alert("Cart is empty!");

        return;
    }

    try{

        let res = await fetch(
            `${BASE_URL}/api/order`,
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json",

                    "Authorization":
                        "Bearer " + token
                },

                body: JSON.stringify({
                    cart
                })
            }
        );

        let data =
            await res.json();

        if(res.ok){

            alert(
                data.message ||
                "Order placed successfully!"
            );

            localStorage.removeItem("cart");

            window.location.href =
                "orders.html";
        }

        else{

            alert(
                data.message ||
                "Order failed"
            );
        }

    }

    catch(err){

        console.log(err);

        alert("Server error");
    }
}

// ================= CHECKOUT =================
function checkout(){

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    if(cart.length === 0){

        alert("Cart is empty!");

        return;
    }

    alert("Checkout successful! (Demo)");
}

// ================= LOGOUT =================
function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("user");
    localStorage.removeItem("cart");

    alert("Logged out successfully");

    window.location.href =
        "login.html";
}

// INIT
loadCart();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

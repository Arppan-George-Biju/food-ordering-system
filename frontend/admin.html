    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{

            background:
                linear-gradient(135deg,#ff9800,#ff5722);

            min-height: 100vh;
        }

        .navbar{
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .dashboard-card{

            border: none;

            border-radius: 25px;

            overflow: hidden;
        }

        .dashboard-left{

            background:
                linear-gradient(135deg,#212529,#343a40);

            color: white;

            padding: 50px;
        }

        .dashboard-right{

            background: white;

            padding: 50px;
        }

        .btn{

            border-radius: 12px;

            height: 50px;

            font-weight: 600;
        }

        .brand-title{

            font-size: 40px;

            font-weight: 700;
        }

        .admin-icon{

            font-size: 80px;
        }

        #result{

            font-size: 18px;

            font-weight: 600;
        }

    </style>

</head>

<body>

<!-- LOGIN CHECK -->
<script>

let token =
    localStorage.getItem("token");

if(!token){

    alert("Please login first!");

    window.location.href =
        "login.html";
}

</script>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
            href="index.html">

            🍔 FoodApp

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="menu.html">

                        Menu

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="cart.html">

                        Cart

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="orders.html">

                        Orders

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                        href="admin.html">

                        Admin

                    </a>

                </li>

                <li class="nav-item ms-3">

                    <button class="btn btn-danger"
                        onclick="logout()">

                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ADMIN SECTION -->
<div class="container py-5">

    <div class="row justify-content-center align-items-center">

        <div class="col-lg-10">

            <div class="card shadow-lg dashboard-card">

                <div class="row g-0">

                    <!-- LEFT -->
                    <div class="col-md-5 dashboard-left d-flex flex-column justify-content-center">

                        <div class="text-center">

                            <div class="admin-icon">
                                👨‍💼
                            </div>

                            <h1 class="brand-title mt-3">
                                Admin Panel
                            </h1>

                            <p class="mt-4">

                                Manage your FoodApp system,
                                verify admin access,
                                and control application data.

                            </p>

                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="col-md-7 dashboard-right d-flex flex-column justify-content-center">

                        <h2 class="fw-bold text-center mb-4">
                            Dashboard Access
                        </h2>

                        <p class="text-center text-muted mb-4">

                            Click below to verify whether
                            you have administrator access.

                        </p>

                        <button
                            class="btn btn-warning w-100"
                            onclick="checkAdmin()">

                            Check Admin Access

                        </button>

                        <div class="text-center mt-4">

                            <p id="result"></p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

// ================= CHECK ADMIN =================
async function checkAdmin(){

    try{

        let res = await fetch(
            "https://foodapp-arppan.duckdns.org/admin/dashboard",
            {
                method: "GET",

                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            }
        );

        let data =
            await res.json();

        let result =
            document.getElementById("result");

        if(res.ok){

            result.innerHTML =
                "✅ " + data.message;

            result.classList.add("text-success");
        }

        else{

            result.innerHTML =
                "❌ " + data.message;

            result.classList.add("text-danger");
        }

    }

    catch(err){

        console.log(err);

        alert("Server error");
    }
}

// ================= LOGOUT =================
function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("user");
    localStorage.removeItem("cart");

    alert("Logged out successfully");

    window.location.href =
        "login.html";
}

</script>

<!-- APP JS -->
<script src="assets/app.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

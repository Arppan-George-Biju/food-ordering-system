<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Menu | FoodApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #f5f5f5;
        }

        .navbar{
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hero{

            background:
                linear-gradient(135deg,#ff9800,#ff5722);

            color: white;

            padding: 50px;

            border-radius: 20px;
        }

        .food-card{

            border: none;

            border-radius: 20px;

            overflow: hidden;

            transition: 0.3s;
        }

        .food-card:hover{

            transform: translateY(-5px);
        }

        .food-card img{

            height: 220px;

            object-fit: cover;
        }

        .btn{

            border-radius: 10px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
            href="index.html">

            🍔 FoodApp

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                        href="menu.html">

                        Menu

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="cart.html">

                        Cart

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="orders.html">

                        Orders

                    </a>

                </li>

                <li class="nav-item ms-3">

                    <button class="btn btn-danger"
                        onclick="logout()">

                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- HERO -->
<div class="container mt-5">

    <div class="hero shadow">

        <h1 class="fw-bold">
            🍔 Explore Our Delicious Menu
        </h1>

        <p class="lead mb-0">
            Fresh meals, fast delivery, and amazing taste.
        </p>

    </div>

</div>

<!-- MENU -->
<div class="container mt-5 mb-5">

    <div class="row"
        id="food-list">

    </div>

</div>

<script>

const BASE_URL =
    "http://127.0.0.1:5000";

// ================= LOAD FOODS =================
async function loadFoods(){

    try{

        const res =
            await fetch(`${BASE_URL}/api/foods`);

        const foods =
            await res.json();

        let html = "";

        foods.forEach(food => {

            html += `
            <div class="col-lg-4 col-md-6 mb-4">

                <div class="card food-card shadow h-100">

                    <img src="${food.image}"
                        class="card-img-top"
                        alt="${food.name}">

                    <div class="card-body text-center d-flex flex-column">

                        <h4 class="fw-bold">
                            ${food.name}
                        </h4>

                        <p class="text-success fw-bold fs-5">
                            ₹${food.price}
                        </p>

                        <button
                            class="btn btn-warning mt-auto"
                            onclick="addToCart(
                                ${food.id},
                                '${food.name}',
                                ${food.price}
                            )">

                            Add to Cart

                        </button>

                    </div>

                </div>

            </div>
            `;
        });

        document.getElementById("food-list")
            .innerHTML = html;

    }

    catch(err){

        console.log(err);

        alert("Failed to load foods");
    }
}

// ================= ADD TO CART =================
function addToCart(id, name, price){

    let token =
        localStorage.getItem("token");

    // NOT LOGGED IN
    if(!token){

        alert("Please login first!");

        window.location.href =
            "login.html";

        return;
    }

    let cart =
        JSON.parse(localStorage.getItem("cart")) || [];

    let existing =
        cart.find(item => item.id === id);

    // ITEM EXISTS
    if(existing){

        existing.quantity += 1;
    }

    // NEW ITEM
    else{

        cart.push({
            id: id,
            name: name,
            price: price,
            quantity: 1
        });
    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert(name + " added to cart!");
}

// ================= LOGOUT =================
function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("user");
    localStorage.removeItem("cart");

    alert("Logged out successfully");

    window.location.href =
        "login.html";
}

// LOAD FOODS
loadFoods();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

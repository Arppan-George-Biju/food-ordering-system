<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Orders | FoodApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #f5f5f5;
        }

        .navbar{
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .hero{

            background:
                linear-gradient(135deg,#ff9800,#ff5722);

            color: white;

            padding: 50px;

            border-radius: 20px;
        }

        .order-card{

            border: none;

            border-radius: 20px;

            transition: 0.3s;
        }

        .order-card:hover{

            transform: translateY(-5px);
        }

        .btn{

            border-radius: 10px;
        }

    </style>

</head>

<body>

<!-- LOGIN CHECK -->
<script>

let token =
    localStorage.getItem("token");

if(!token){

    alert("Please login first!");

    window.location.href =
        "login.html";
}

</script>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
            href="index.html">

            🍔 FoodApp

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item">

                    <a class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="menu.html">

                        Menu

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="cart.html">

                        Cart

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                        href="orders.html">

                        Orders

                    </a>

                </li>

                <li class="nav-item ms-3">

                    <button class="btn btn-danger"
                        onclick="logout()">

                        Logout

                    </button>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- HERO -->
<div class="container mt-5">

    <div class="hero shadow">

        <h1 class="fw-bold">
            📦 Your Orders
        </h1>

        <p class="lead mb-0">
            Track and view all your previous food orders.
        </p>

    </div>

</div>

<!-- ORDERS -->
<div class="container mt-5 mb-5">

    <div id="orders-container"></div>

</div>

<script>

const BASE_URL =
    "http://127.0.0.1:5000";

// ================= LOAD ORDERS =================
async function loadOrders(){

    try{

        let res =
            await fetch(`${BASE_URL}/api/orders`,{

                method: "GET",

                headers: {
                    "Authorization":
                        "Bearer " + token
                }
            });

        let orders =
            await res.json();

        let container =
            document.getElementById("orders-container");

        // NO ORDERS
        if(!orders.length){

            container.innerHTML = `
                <div class="card order-card shadow p-5 text-center">

                    <h2>📦</h2>

                    <h4 class="mt-3">
                        No Orders Yet
                    </h4>

                    <p class="text-muted">
                        Start ordering delicious food now.
                    </p>

                    <a href="menu.html"
                        class="btn btn-warning mt-2">

                        Browse Menu

                    </a>

                </div>
            `;

            return;
        }

        // SHOW ORDERS
        let html = "";

        orders.forEach(order => {

            html += `
            <div class="card order-card shadow mb-4 p-4">

                <div class="d-flex justify-content-between align-items-center flex-wrap">

                    <div>

                        <h3 class="fw-bold">
                            Order #${order.id}
                        </h3>

                        <p class="mb-1">
                            <b>Total:</b>
                            ₹${order.total}
                        </p>

                        <p class="mb-0 text-muted">
                            <b>Date:</b>
                            ${order.created_at}
                        </p>

                    </div>

                    <div class="mt-3 mt-md-0">

                        <span class="badge bg-success p-3">
                            Completed
                        </span>

                    </div>

                </div>

            </div>
            `;
        });

        container.innerHTML = html;
    }

    catch(err){

        console.log(err);

        alert("Failed to load orders");
    }
}

// ================= LOGOUT =================
function logout(){

    localStorage.removeItem("token");
    localStorage.removeItem("user");
    localStorage.removeItem("cart");

    alert("Logged out successfully");

    window.location.href =
        "login.html";
}

// LOAD ORDERS
loadOrders();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

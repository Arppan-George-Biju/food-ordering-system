<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | FoodApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{

            min-height: 100vh;

            background:
                linear-gradient(rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1974&auto=format&fit=crop');

            background-size: cover;
            background-position: center;

            display: flex;
            flex-direction: column;
        }

        .navbar{
            backdrop-filter: blur(10px);
        }

        .login-container{

            flex: 1;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 40px 20px;
        }

        .login-card{

            width: 100%;
            max-width: 430px;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(14px);

            border-radius: 25px;

            padding: 40px;

            color: white;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .login-title{
            font-size: 2rem;
            font-weight: 700;
        }

        .form-control{

            border-radius: 12px;

            padding: 12px;

            border: none;
        }

        .form-control:focus{

            box-shadow: 0 0 0 0.25rem rgba(255,193,7,0.3);
        }

        .btn-login{

            background: #ffc107;
            border: none;

            border-radius: 12px;

            padding: 12px;

            font-weight: 600;

            transition: 0.3s;
        }

        .btn-login:hover{

            background: #ffb300;

            transform: translateY(-2px);
        }

        .register-link{

            color: #ffc107;

            text-decoration: none;
        }

        .register-link:hover{

            text-decoration: underline;
        }

        .food-icon{

            font-size: 4rem;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
            href="index.html">

            🍔 FoodApp

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="menu.html">

                        Menu

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                        href="login.html">

                        Login

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="register.html">

                        Register

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- LOGIN SECTION -->
<div class="login-container">

    <div class="login-card text-center">

        <div class="food-icon mb-3">
            🍔
        </div>

        <h2 class="login-title mb-2">
            Welcome Back
        </h2>

        <p class="mb-4 text-light">
            Login to continue ordering delicious food.
        </p>

        <!-- EMAIL -->
        <div class="mb-3 text-start">

            <label class="form-label">
                Email Address
            </label>

            <input
                id="email"
                type="email"
                class="form-control"
                placeholder="Enter your email">

        </div>

        <!-- PASSWORD -->
        <div class="mb-4 text-start">

            <label class="form-label">
                Password
            </label>

            <input
                id="password"
                type="password"
                class="form-control"
                placeholder="Enter your password">

        </div>

        <!-- LOGIN BUTTON -->
        <button
            class="btn btn-login w-100"
            onclick="loginUser()">

            Login

        </button>

        <!-- REGISTER -->
        <p class="mt-4">

            Don't have an account?

            <a href="register.html"
                class="register-link">

                Register

            </a>

        </p>

    </div>

</div>

<!-- LOGIN SCRIPT -->
<script>

const BASE_URL =
    "http://127.0.0.1:5000";

// AUTO REDIRECT IF LOGGED IN
window.onload = function(){

    let token =
        localStorage.getItem("token");

    if(token){

        window.location.href =
            "dashboard.html";
    }
};

// LOGIN FUNCTION
async function loginUser(){

    let email =
        document.getElementById("email").value;

    let password =
        document.getElementById("password").value;

    if(!email || !password){

        alert("Please fill all fields");

        return;
    }

    try{

        let res = await fetch(
            `${BASE_URL}/login`,
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        let data = await res.json();

        if(res.ok){

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );

            alert("Login successful!");

            window.location.href =
                "dashboard.html";
        }

        else{

            alert(
                data.message ||
                "Login failed"
            );
        }

    }

    catch(err){

        console.log(err);

        alert("Server error");
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register | FoodApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{

            background:
                linear-gradient(135deg,#ff9800,#ff5722);

            min-height: 100vh;
        }

        .navbar{
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .register-card{

            border: none;

            border-radius: 25px;

            overflow: hidden;
        }

        .register-left{

            background:
                linear-gradient(135deg,#212529,#343a40);

            color: white;

            padding: 50px;
        }

        .register-right{

            background: white;

            padding: 50px;
        }

        .form-control{

            height: 50px;

            border-radius: 12px;
        }

        .btn{

            border-radius: 12px;

            height: 50px;

            font-weight: 600;
        }

        .brand-title{

            font-size: 40px;

            font-weight: 700;
        }

        .register-image{

            font-size: 80px;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3"
            href="index.html">

            🍔 FoodApp

        </a>

        <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                        href="index.html">

                        Home

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="menu.html">

                        Menu

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                        href="login.html">

                        Login

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                        href="register.html">

                        Register

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- REGISTER SECTION -->
<div class="container py-5">

    <div class="row justify-content-center align-items-center">

        <div class="col-lg-10">

            <div class="card shadow-lg register-card">

                <div class="row g-0">

                    <!-- LEFT -->
                    <div class="col-md-5 register-left d-flex flex-column justify-content-center">

                        <div class="text-center">

                            <div class="register-image">
                                🍔
                            </div>

                            <h1 class="brand-title mt-3">
                                FoodApp
                            </h1>

                            <p class="mt-4">

                                Create your account and enjoy
                                delicious food ordering with
                                fast delivery and secure access.

                            </p>

                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="col-md-7 register-right">

                        <h2 class="fw-bold mb-4 text-center">
                            Create Account
                        </h2>

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input
                                type="text"
                                id="name"
                                class="form-control"
                                placeholder="Enter your name">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email Address
                            </label>

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="Enter your email">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Password
                            </label>

                            <input
                                type="password"
                                id="password"
                                class="form-control"
                                placeholder="Enter password">

                        </div>

                        <button
                            class="btn btn-warning w-100"
                            onclick="registerUser()">

                            Create Account

                        </button>

                        <div class="text-center mt-4">

                            Already have an account?

                            <a href="login.html"
                                class="text-decoration-none fw-bold">

                                Login

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- APP JS -->
<script src="assets/app.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
